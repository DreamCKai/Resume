<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume</title>
  <link rel="stylesheet" href="./components/resume_module/resume_module.css">
  <link rel="stylesheet" href="./components/dock/dock.css">
</head>
<body>
  <div class="shell">
    <main id="canvas-stage" class="canvas-stage" data-view-mode="continuous" data-grid-visible="false">
      <div id="canvas-frame" class="canvas-frame">
        <div id="page-guides" class="page-guides" aria-hidden="true"></div>
        <div id="grid-overlay" class="grid-overlay" aria-hidden="true"></div>
        <div id="resume-canvas" class="resume-canvas"></div>
      </div>
    </main>
  </div>

  <resume-dock id="resume-dock" class="no-print"></resume-dock>

  <input id="import-json-input" type="file" accept="application/json,.json" hidden>
  <script id="embedded-resume-state" type="application/json">null</script>
  <script src="index.js" type="module"></script>
</body>
<style type="text/css">
:root {
	--paper: #fffdf9;
	--paper-tint: #f3ece1;
	--paper-shadow: rgba(37, 28, 16, 0.16);
	--page-line: rgba(61, 43, 20, 0.1);
	--bg-a: #eee5d7;
	--bg-b: #f8f3ec;
	--theme-text: #221d17;
	--theme-heading: #221710;
	--theme-accent: #8a5c33;
	--theme-accent-rgb: 138, 92, 51;
	--theme-divider: rgba(var(--theme-accent-rgb), 0.42);
	--theme-border: rgba(110, 83, 54, 0.18);
	--theme-heading-font: "Times New Roman", "Georgia", "Songti SC", "SimSun", serif;
	--theme-body-font: "Aptos", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
	--row-size: 14px;
	--grid-gap: 14px;
	--module-padding: 18px;
	--module-title-size: 15px;
	--sheet-width: 920px;
	--sheet-height: 1200px;
	--page-height: 1320px;
	--col-px: 60px;
}

* {
	box-sizing: border-box;
}

html,
body {
	margin: 0;
	padding: 0;
	min-height: 100%;
	background:
	radial-gradient(circle at top left, rgba(255, 235, 194, 0.7), transparent 26%),
	linear-gradient(180deg, var(--bg-b) 0%, var(--bg-a) 100%);
	color: var(--theme-text);
	font-family: var(--theme-body-font);
}

body {
	min-height: 100vh;
}

button,
select,
input {
	font: inherit;
}

button {
	cursor: pointer;
}

.shell {
	min-height: 100vh;
	padding: 28px 18px 188px;
}

.canvas-stage {
	width: min(100%, 1120px);
	margin: 0 auto;
}

.canvas-frame {
	position: relative;
	width: min(100%, 980px);
	margin: 0 auto;
	padding: 28px 0 132px;
}

.page-guides,
.grid-overlay {
	position: absolute;
	left: 50%;
	top: 28px;
	transform: translateX(-50%);
	width: var(--sheet-width);
	height: var(--sheet-height);
	pointer-events: none;
	border-radius: 28px;
}

.page-guides {
	opacity: 0;
	transition: opacity 0.18s ease;
}

.canvas-stage[data-view-mode="artboard"] .page-guides {
	opacity: 1;
	background:
	repeating-linear-gradient(
		to bottom,
		transparent 0 calc(var(--page-height) - 36px),
		rgba(71, 53, 30, 0.1) calc(var(--page-height) - 36px) calc(var(--page-height) - 34px),
		transparent calc(var(--page-height) - 34px) calc(var(--page-height) + 30px)
	);
	box-shadow:
	inset 0 0 0 1px rgba(86, 61, 35, 0.08),
	0 18px 40px rgba(0, 0, 0, 0.05);
}

.grid-overlay {
	opacity: 0;
	transition: opacity 0.18s ease;
	background:
	repeating-linear-gradient(
		to right,
		rgba(var(--theme-accent-rgb), 0.12) 0 1px,
		transparent 1px calc(var(--col-px) + var(--grid-gap))
	),
	repeating-linear-gradient(
		to bottom,
		rgba(var(--theme-accent-rgb), 0.08) 0 1px,
		transparent 1px calc(var(--row-size) + var(--grid-gap))
	);
}

.canvas-stage[data-grid-visible="true"] .grid-overlay {
	opacity: 1;
}

.resume-canvas {
	position: relative;
	width:794px;
	margin: 0 auto;
	display: grid;
	grid-template-columns: repeat(12, minmax(0, 1fr));
	grid-auto-rows: var(--row-size);
	gap: var(--grid-gap);
	background:
	linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 251, 245, 0.98) 100%);
	box-shadow:
	0 28px 70px var(--paper-shadow),
	0 0 0 1px rgba(83, 57, 31, 0.06);
	overflow: visible;
}

.resume-canvas::before {
	content: "";
	position: absolute;
	left: 142px;
	right: 142px;
	top: -10px;
	height: 10px;
	border-radius: 999px;
	background: linear-gradient(70deg, rgba(32, 24, 16, 0.98) 0 70%, var(--theme-accent) 70% 100%);
}

.editable {
	outline: none;
	border-radius: 10px;
	white-space: pre-wrap;
	word-break: break-word;
	transition: background-color 0.12s ease, box-shadow 0.12s ease;
}

.editable:hover {
	background: rgba(var(--theme-accent-rgb), 0.06);
}

.editable:focus {
	background: rgba(var(--theme-accent-rgb), 0.1);
	box-shadow: inset 0 -2px 0 rgba(var(--theme-accent-rgb), 0.34);
}

.editable[data-single-line="true"] {
	white-space: normal;
}

.editable:empty::before {
	content: attr(data-placeholder);
	color: rgba(129, 112, 96, 0.82);
	pointer-events: none;
}

.hidden {
	display: none !important;
}

.muted {
	margin: 0;
	font-size: 12px;
	line-height: 1.55;
	color: rgba(34, 29, 23, 0.58);
}

@media screen and (max-width: 900px) {
	/*.resume-canvas {
	padding: 34px 20px 54px;
	}*/

	/*.resume-canvas::before {
	left: 20px;
	right: 20px;
	}*/
}

@media screen and (max-width: 760px) {
	.shell {
	padding: 16px 10px 156px;
	}

	.panel-grid {
	grid-template-columns: 1fr;
	}

}

@media print {
	@page {
	size: A4;
	margin: 0cm;
	background: ;
	}

	html,
	body {
	margin: 0 !important;
	padding: 0 !important;
	background: #fff;
	-webkit-print-color-adjust: exact;
	print-color-adjust: exact;
	}

	.shell {
	padding: 0;
	}

	.canvas-frame {
	width: 100%;
	padding: 0;
	}

	.resume-canvas {
	width: 100%;
	margin: 0;
	/*padding: 42px 42px 58px;*/
	box-shadow: none;
	border-radius: 0;
	background: #fff;
	}

	.resume-canvas::before,
	.no-print,
	.page-guides,
	.grid-overlay,
	.dock {
	display: none !important;
	}

	.editable:empty::before {
	content: "";
	}
}
</style>
</html>
